spring.application.name=certify-backend
server.port=${PORT:8080}
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fsad_certify?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jackson.serialization.write-dates-as-timestamps=false

app.jwt.secret=${APP_JWT_SECRET:certify-super-secret-jwt-signing-key-2026-fsad-demo}
app.jwt.expiration-millis=86400000
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://0.0.0.0:*}
app.mail.enabled=${APP_MAIL_ENABLED:true}
app.mail.from=${APP_MAIL_FROM:your-business-email@gmail.com}
app.mail.expiry-alert-days=${APP_MAIL_EXPIRY_ALERT_DAYS:1}
app.mail.expiry-alert-cron=${APP_MAIL_EXPIRY_ALERT_CRON:0 0 9 * * *}
app.mail.escalation-after-days=${APP_MAIL_ESCALATION_AFTER_DAYS:7}
app.mail.escalation-cron=${APP_MAIL_ESCALATION_CRON:0 30 9 * * *}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:your-business-email@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:your-app-password}
spring.mail.test-connection=${SPRING_MAIL_TEST_CONNECTION:false}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
